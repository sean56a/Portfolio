<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Page Not Found — Your Name</title>
<meta name="description" content="Page not found." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/style.css" />
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="hero-bg-orb orb-a" style="position:fixed;"></div>
<div class="hero-bg-orb orb-b" style="position:fixed;"></div>

<div class="error-page">
  <div>
    <span class="path-tag reveal in-view">~/portfolio/<span class="seg-accent">404</span></span>
    <div class="error-code reveal in-view" style="margin-top:20px;">404</div>
    <h2 class="reveal in-view" style="margin-top:12px;">This page doesn't exist.</h2>
    <p class="reveal in-view" style="margin-top:14px; max-width:420px; margin-left:auto; margin-right:auto;">
      The page you were looking for may have been moved, renamed, or never existed. Let's get you back on track.
    </p>
    <div class="reveal in-view" style="display:flex; gap:14px; justify-content:center; margin-top:32px; flex-wrap:wrap;">
      <a href="index.html" class="btn btn-primary"><i data-lucide="home" style="width:16px;height:16px;"></i> Back to home</a>
      <a href="contact.html" class="btn btn-secondary">Contact me</a>
    </div>
  </div>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>
